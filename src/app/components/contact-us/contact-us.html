<section class="contact-page bg-white pt-40">
  <div class="contact-shell">
    <div class="contact-panel">
      <div class="contact-copy">
        <h1 class="text-[64px] md:text-[64px] font-normal font-['Bebas_Neue'] text-[#1D1D1D] uppercase tracking-wide">
          Get in Touch With Us!
        </h1>

        <p class=" text-[#6E6E6E]">

          We'd love to hear from you! Whether you have questions, need assistance, or want to share your thoughts, our
          team is here to help.
        </p>
      </div>

      <form class="contact-form" action="#" method="post">
        <div class="contact-form-row">
          <input class="contact-input" type="text" name="firstName" placeholder="First name" />
          <input class="contact-input" type="text" name="lastName" placeholder="Last name" />
        </div>

        <input class="contact-input" type="tel" name="phone" placeholder="Phone no" />
        <input class="contact-input" type="email" name="email" placeholder="Email address" />
        <textarea class="contact-input contact-textarea" name="message" placeholder="Message"></textarea>

        <button class="contact-submit" type="submit">Send</button>
      </form>

      <div class="contact-social mb-6 sm:mb-8">
        <div class="contact-social-row">
          <span class="contact-social-label">Visit us on</span>
          <a class="contact-social-link" href="#" aria-label="Instagram">
            <img src="/contact_us/fi_1384015.png" alt="" />
          </a>
          <a class="contact-social-link" href="#" aria-label="Facebook">
            <img src="/contact_us/Group.png" alt="" />
          </a>
        </div>
      </div>
    </div>

 	<div class="relative w-full aspect-[16/9] sm:aspect-[16/8] lg:h-[624px] mt-10 sm:-mt-8 z-0">
			<div
				class="absolute top-0 left-0 w-full h-[100px] bg-gradient-to-b from-white via-white/80 to-transparent z-10 pointer-events-none">
			</div>

		<img src="/join_and_support/Group 40_edited.png" alt="Join Us and Contact Us"
  class="w-full h-full object-cover object-top relative z-0" />
		</div>
  </div>
</section>
